server:
  port: 8080

spring:
  application:
    name: potato-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/potato}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:potato-dev-secret-change-me-please-0123456789abcdef}
    expiration-seconds: 86400
  seed:
    admin-password: ${SEED_ADMIN_PASSWORD:admin123}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:potato-assets}

services:
  mongo:
    image: mongo:7
    container_name: potato-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: potato-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: potato-backend
    working_dir: /app
    command: sh -c "mvn -q spring-boot:run"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/potato
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=potato-assets
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - minio
    restart: unless-stopped

  frontend:
    image: node:20
    container_name: potato-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - BACKEND_PROXY=http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  mcp-server:
    image: node:20
    container_name: potato-mcp
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - MCP_PORT=3001
      - BACKEND_URL=http://backend:8080/api/v1
    volumes:
      - ./mcp-server:/app
      - mcp-node-modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
  minio-data:
  maven-cache:
  frontend-node-modules:
  mcp-node-modules:
